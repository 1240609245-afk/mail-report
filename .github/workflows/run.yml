name: Auto Mail Report

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install python-dotenv openpyxl

      - name: 检查环境变量
        run: |
          python -c "import os; print('EMAIL_1 exists:', bool(os.getenv('EMAIL_1'))); print('PASSWORD_1 exists:', bool(os.getenv('PASSWORD_1'))); print('HOST_1 exists:', bool(os.getenv('HOST_1')))"
        env:
          EMAIL_1: ${{ secrets.EMAIL_1 }}
          PASSWORD_1: ${{ secrets.PASSWORD_1 }}
          HOST_1: ${{ secrets.HOST_1 }}

      - name: 运行脚本
        env:
          EMAIL_1: ${{ secrets.EMAIL_1 }}
          PASSWORD_1: ${{ secrets.PASSWORD_1 }}
          HOST_1: ${{ secrets.HOST_1 }}

          EMAIL_2: ${{ secrets.EMAIL_2 }}
          PASSWORD_2: ${{ secrets.PASSWORD_2 }}
          HOST_2: ${{ secrets.HOST_2 }}

          EMAIL_3: ${{ secrets.EMAIL_3 }}
          PASSWORD_3: ${{ secrets.PASSWORD_3 }}
          HOST_3: ${{ secrets.HOST_3 }}

          EMAIL_4: ${{ secrets.EMAIL_4 }}
          PASSWORD_4: ${{ secrets.PASSWORD_4 }}
          HOST_4: ${{ secrets.HOST_4 }}

          EMAIL_5: ${{ secrets.EMAIL_5 }}
          PASSWORD_5: ${{ secrets.PASSWORD_5 }}
          HOST_5: ${{ secrets.HOST_5 }}
        run: python mail_filter.py

      - name: 提交更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto update report" || echo "no changes"
          git push
