name: 邮件过滤器 新

on:
  workflow_dispatch:
  schedule:
    # 北京时间 06:00
    - cron: '0 22 * * *'
    # 北京时间 12:00
    - cron: '0 4 * * *'
    # 北京时间 21:00
    - cron: '0 13 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install python-dotenv openpyxl

      # ✅ 检查环境变量（防止没配成功）
      - name: 检查环境变量
        env:
          EMAIL_1: ${{ secrets.EMAIL_1 }}
          PASSWORD_1: ${{ secrets.PASSWORD_1 }}
          HOST_1: ${{ secrets.HOST_1 }}
        run: python -c "import os; print('EMAIL_1 exists:', bool(os.getenv('EMAIL_1'))); print('PASSWORD_1 exists:', bool(os.getenv('PASSWORD_1'))); print('HOST_1 exists:', bool(os.getenv('HOST_1')))"

      # ✅ 运行你的邮件脚本
      - name: 运行脚本
        env:
          EMAIL_1: ${{ secrets.EMAIL_1 }}
          PASSWORD_1: ${{ secrets.PASSWORD_1 }}
          HOST_1: ${{ secrets.HOST_1 }}

          EMAIL_2: ${{ secrets.EMAIL_2 }}
          PASSWORD_2: ${{ secrets.PASSWORD_2 }}
          HOST_2: ${{ secrets.HOST_2 }}

          EMAIL_3: ${{ secrets.EMAIL_3 }}
          PASSWORD_3: ${{ secrets.PASSWORD_3 }}
          HOST_3: ${{ secrets.HOST_3 }}

          EMAIL_4: ${{ secrets.EMAIL_4 }}
          PASSWORD_4: ${{ secrets.PASSWORD_4 }}
          HOST_4: ${{ secrets.HOST_4 }}

          EMAIL_5: ${{ secrets.EMAIL_5 }}
          PASSWORD_5: ${{ secrets.PASSWORD_5 }}
          HOST_5: ${{ secrets.HOST_5 }}

        run: python mail_filter.py

      # ✅ 提交更新（已修复权限问题）
      - name: 提交更新
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update report" || echo "no changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
